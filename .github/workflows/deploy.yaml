name: Build and Deploy to OpenShift

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/brohjoe1/personnel-tracker

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: personnel-tracker-jar
        path: target/personnel-tracker-*.jar
        retention-days: 1

  push-image:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to OpenShift
    needs: push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install oc CLI
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: "latest"

    - name: Authenticate to OpenShift
      run: |
        oc login --token=${{ secrets.OPENSHIFT_TOKEN }} \
          --server=https://api.rm2.thpm.p1.openshiftapps.com:6443 \
          --insecure-skip-tls-verify

    - name: Set namespace
      run: oc project brohjoe1-dev

    - name: Apply Kubernetes manifests
      run: oc apply -f k8s/

    - name: Update deployment with latest image
      run: |
        oc set image deployment/personnel-tracker \
          personnel-tracker=${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Check pod status
      run: |
        echo "=== Pod Status ==="
        oc get pods -l app=personnel-tracker -n brohjoe1-dev
        echo "=== Recent Events ==="
        oc get events -n brohjoe1-dev --sort-by='.lastTimestamp' | tail -20
        echo "=== Deployment Description ==="
        oc describe deployment personnel-tracker -n brohjoe1-dev

    - name: Wait for rollout
      run: oc rollout status deployment/personnel-tracker -n brohjoe1-dev --timeout=10m

    - name: Verify deployment
      run: |
        echo "Deployment successful!"
        oc get pods -l app=personnel-tracker -n brohjoe1-dev
        oc get route personnel-tracker -n brohjoe1-dev