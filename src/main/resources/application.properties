spring.application.name=personnel-tracker
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/personnel_tracker}
spring.data.mongodb.auto-index-creation=true

# Kafka - Confluent Cloud
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}
spring.kafka.consumer.group-id=personnel-tracker-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.admin.fail-fast=false
app.kafka.topic=asset-events

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
