spring.application.name=personnel-tracker
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:trackerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed data
spring.sql.init.mode=always

# Actuator - expose health for OpenShift liveness/readiness probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
