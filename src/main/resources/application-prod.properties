# Production Profile - CGI Personnel & Asset Tracker
# Activated via: SPRING_PROFILES_ACTIVE=prod
# Used when deployed to OpenShift

# Hibernate DDL - validate only in production, no automatic schema updates
spring.jpa.hibernate.ddl-auto=validate

# SQL Logging - disable verbose SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console - disable web console access in production
spring.h2.console.enabled=false

# Kafka Configuration - graceful degradation if broker is unavailable
spring.kafka.admin.fail-fast=false
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.request.timeout.ms=3000

# Actuator - limit endpoint exposure for security
# Only expose health and info endpoints
management.endpoints.web.exposure.include=health,info

# Health endpoint detail level - show details only to authorized users
management.endpoint.health.show-details=when-authorized

# Server configuration
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024
