# Production Profile - OpenShift deployment
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
management.health.mongo.enabled=true

# Kafka - uses env vars from OpenShift secrets
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG}
spring.kafka.properties.session.timeout.ms=45000
spring.kafka.admin.fail-fast=false
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.request.timeout.ms=3000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Server
server.port=8080
server.compression.enabled=true