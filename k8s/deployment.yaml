apiVersion: apps/v1
kind: Deployment
metadata:
  name: personnel-tracker
  namespace: brohjoe1-dev
  labels:
    app: personnel-tracker
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personnel-tracker
  template:
    metadata:
      labels:
        app: personnel-tracker
    spec:
      containers:
      - name: personnel-tracker
        image: ghcr.io/brohjoe1/personnel-tracker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: uri
        - name: SPRING_KAFKA_ADMIN_FAIL_FAST
          value: "false"
        - name: SPRING_AUTOCONFIGURE_EXCLUDE
          value: "org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5
